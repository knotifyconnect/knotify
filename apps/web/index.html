      <h1>knotify · the professional network for Munich's internationals</h1>
      <p>
        knotify is a quieter professional network for international students and professionals
        in Munich. See your connections as a living, navigable map, verify real skills, and get
        warm introductions over coffee at partner cafés across the city. New to Munich? This is
        how you build a network worth keeping.
      </p>

      <h2>Who knotify is for</h2>
      <ul>
        <li>International students and newcomers building a network in Munich</li>
        <li>Students at TUM, LMU and other Munich universities</li>
        <li>Expats and internationals who want real professional connections in Munich</li>
        <li>Professionals who want meaningful introductions, not a feed to scroll</li>
      </ul>

      <h2>How knotify works</h2>
      <ul>
        <li>Add the people you know. Your network becomes a living, navigable map.</li>
        <li>knotify surfaces who is going cold, who hit a milestone, and who you can help.</li>
        <li>Meet in person at partner cafés across Munich. Real coffee, real connection.</li>
      </ul>

      <h2>Frequently asked questions</h2>
      <p><strong>How do I network in Munich as an international student?</strong> Join knotify,
        add the people you already know, and get matched to the people, groups and events that
        fit who you are. knotify tells you who to reach out to and helps you meet in person.</p>
      <p><strong>Is knotify free?</strong> knotify is in a free private beta for Munich's
        international community. Join the waiting list to request access.</p>
